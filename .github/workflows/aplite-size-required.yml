name: Aplite Size Check

# Guards the aplite launch ceiling: past ~22.06 KB image the firmware silently
# refuses to start the app (see scripts/check-aplite-size.sh). Runs on pushes to
# main too, not just PRs — this repo often lands work on main directly.
on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  aplite-size:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up mise toolchain
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          install: true
          cache: true

      - name: Install Pebble SDK
        run: scripts/ensure-pebble-sdk.sh

      - name: Build dev .pbw
        run: mise build dev

      - name: Check aplite image size against the launch ceiling
        run: scripts/check-aplite-size.sh
